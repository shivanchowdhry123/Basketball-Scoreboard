<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basketball Scoreboard - Pro Edition</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="top-controls">
        <div class="period-box">
            <span>PERIOD</span>
            <div id="period-display" class="small-display">1</div>
            <button onclick="changePeriod()">NEXT</button>
        </div>
        <button id="reset-btn" onclick="resetGame()">NEW GAME</button>
    </div>

    <div class="scoreboard-container">
        <div class="card" id="home-card">
            <h3>HOME</h3>
            <div class="score-display" id="home-score">0</div>
            <div class="btn-group">
                <button onclick="addHome(1)">+1</button>
                <button onclick="addHome(2)">+2</button>
                <button onclick="addHome(3)">+3</button>
            </div>
            <div class="foul-box">
                <span>FOULS: <span id="home-fouls">0</span></span>
                <button class="foul-btn" onclick="addHomeFoul()">+</button>
            </div>
        </div>
        
        <div class="card" id="guest-card">
            <h3>GUEST</h3>
            <div class="score-display" id="guest-score">0</div>
            <div class="btn-group">
                <button onclick="addGuest(1)">+1</button>
                <button onclick="addGuest(2)">+2</button>
                <button onclick="addGuest(3)">+3</button>
            </div>
            <div class="foul-box">
                <span>FOULS: <span id="guest-fouls">0</span></span>
                <button class="foul-btn" onclick="addGuestFoul()">+</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
